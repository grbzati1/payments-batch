name: deploy-azure-container-apps

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}

      - name: Build and push API image
        run: |
          docker build -f Dockerfile.api -t ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/payments-api:${{ github.sha }} .
          docker push ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/payments-api:${{ github.sha }}

      - name: Build and push Worker image
        run: |
          docker build -f Dockerfile.worker -t ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/payments-worker:${{ github.sha }} .
          docker push ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/payments-worker:${{ github.sha }}

      - name: Deploy API Container App
        run: |
          az containerapp update \
            --name payments-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/payments-api:${{ github.sha }}

      - name: Deploy Worker Container App
        run: |
          az containerapp update \
            --name payments-worker \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.AZURE_CONTAINER_REGISTRY_NAME }}.azurecr.io/payments-worker:${{ github.sha }}
